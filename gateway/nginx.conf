# =============================================================================
# Nginx Ingress Gateway — DDoS-Hardened Reverse Proxy
# =============================================================================
# This gateway sits in front of the entire Kubernetes application.
# All external traffic passes through here before reaching frontend or backend.
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off; 

    # =========================================================================
    # DDoS PROTECTION: TIMEOUT HARDENING
    # Short timeouts prevent Slowloris-style attacks that hold connections open
    # =========================================================================
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     15s;
    send_timeout          10s;

    # =========================================================================
    # DDoS PROTECTION: BUFFER SIZE LIMITS
    # Prevents oversized header/body attacks
    # =========================================================================
    client_body_buffer_size   1k;
    client_header_buffer_size 1k;
    client_max_body_size      1m;
    large_client_header_buffers 2 1k;

    # =========================================================================
    # DDoS PROTECTION: RATE LIMITING
    # =========================================================================
    # 10 requests/second per IP, 10m zone tracks ~160,000 unique IPs
    limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=10r/s;

    # Max concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Return 429 Too Many Requests (not default 503)
    limit_req_status 429;
    limit_conn_status 429;

    # =========================================================================
    # LOGGING
    # =========================================================================
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_user_agent" '
                    'rate=$limit_req_status conn=$limit_conn_status '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # =========================================================================
    # DDoS PROTECTION: BOT FILTERING
    # =========================================================================
    map $http_user_agent $bad_bot {
        default 0;
        "~*^$"                    1;   # Empty user-agent
        "-"                       1;   # Missing user-agent as logged by Nginx
        "~*(havij|sqlmap|nmap)"   1;   # Known attack tools
        "~*(nikto|masscan)"       1;   # Scanning tools
    }

    # =========================================================================
    # UPSTREAM DEFINITIONS (Kubernetes Services)
    # =========================================================================
    # These resolve via Kubernetes DNS within the cluster
    upstream frontend_upstream {
        server frontend-service.multi-pod-app.svc.cluster.local:80;
    }

    upstream backend_upstream {
        server backend-service.multi-pod-app.svc.cluster.local:5000;
    }

    # =========================================================================
    # SERVER BLOCK — Single entry point for the entire application
    # =========================================================================
    server {
        listen 80;
        server_name localhost;

        # =====================================================================
        # DDoS PROTECTION: RATE & CONNECTION LIMITS (applied globally)
        # =====================================================================
        limit_req zone=req_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 10;

        # =====================================================================
        # DDoS PROTECTION: BLOCK BAD BOTS
        # =====================================================================
        if ($bad_bot) {
            return 403;
        }

        if ($http_user_agent ~ "^\s*$") {
            return 403;
        }

        if ($http_user_agent = "-") {
            return 403;
        }

        # Block requests with no Host header
        if ($host = '') {
            return 444;
        }

        # =====================================================================
        # DDoS PROTECTION: HTTP METHOD RESTRICTION
        # =====================================================================
        if ($request_method !~ ^(GET|HEAD|POST)$) {
            return 444;
        }

        # =====================================================================
        # SECURITY HEADERS
        # =====================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # =====================================================================
        # ROUTING: API requests → Backend pods
        # =====================================================================
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for upstream connections
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
            proxy_send_timeout    10s;
        }

        # =====================================================================
        # ROUTING: Everything else → Frontend pods
        # =====================================================================
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # =====================================================================
        # HEALTH CHECK (for Kubernetes probes)
        # =====================================================================
        location /gateway-health {
            access_log off;
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # STATUS PAGE (internal monitoring)
        # =====================================================================
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 10.0.0.0/8;       # Kubernetes pod network
            allow 172.16.0.0/12;    # Docker network
            deny all;
        }
    }
}
