apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: multi-pod-app
  labels:
    app: frontend
spec:
  # ClusterIP — only reachable within the cluster (gateway proxies to this)
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
