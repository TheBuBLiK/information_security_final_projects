apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: multi-pod-app
  labels:
    app: gateway
spec:
  # NodePort exposes the gateway as the single entry point to the application
  type: NodePort
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
